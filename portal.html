<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW WAVE | Early Access</title>
    <link rel="stylesheet" href="portal.css">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <h1>NEW WAVE</h1>
        <div class="subtitle">Enter Early Access</div>
        
        <form id="accessForm">
            <input type="text" id="userName" placeholder="FULL NAME" required>
            <input type="tel" id="userPhone" placeholder="PHONE NUMBER (WHATSAPP)" required>
            <input type="password" id="passcode" placeholder="PASSCODE" required>
            
            <button type="submit" id="submitBtn">CONFIRM</button>
        </form>
        
        <p id="msg">Invalid Passcode. Access Denied.</p>
    </div>
</div>

<script src="portal.js"></script>
</body>
</html>
