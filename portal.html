<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW WAVE | PORTAL</title>
    <link rel="stylesheet" href="portal.css">
    <link rel="icon" type="image/png" href="Logo.png">
</head>
<body>

    <div class="portal-container">
        <img src="Logo.png" class="logo" alt="New Wave">
        
        <div id="countdown">00 : 00 : 00 : 00</div>

        <div class="section">
            <p class="label">REGISTRATION</p>
            <button class="btn white-btn" onclick="joinWaitlist()">REQUEST EARLY ACCESS</button>
        </div>

        <div class="section gate">
            <p class="label">PRIVATE ENTRY</p>
            <input type="text" id="accessCode" placeholder="ENTER ACCESS CODE">
            <button class="btn outline-btn" onclick="checkCode()">UNLOCK SHOP</button>
        </div>

        <p class="footer-status">SYSTEM STATUS: ACTIVE // COLLECTION_01_LOCKED</p>
    </div>

    <script src="portal.js"></script>
</body>
</html>
