<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHOP | NEW WAVE</title>
    <link rel="icon" type="image/png" href="Logo.png">
    <link rel="apple-touch-icon" href="Logo.png">
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="shop-body">

    <!-- Product Modal -->
    <div id="product-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">✕</span>
            <img id="modal-img" src="" alt="Product">
            <h2 id="modal-name"></h2>
            <p id="modal-price"></p>
            
            <div id="modal-options-container"></div>

            <div class="modal-qty-wrap">
                <span class="label">QUANTITY</span>
                <div class="qty-ctrl">
                    <button class="qty-btn" onclick="changeModalQty(-1)">-</button>
                    <span id="modal-qty-num" class="qty-num">1</span>
                    <button class="qty-btn" onclick="changeModalQty(1)">+</button>
                </div>
            </div>

            <button class="confirm-add-btn" onclick="confirmAddToCart()">ADD TO BAG</button>
        </div>
    </div>

    <div class="cart-overlay" onclick="toggleCart()"></div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="sidebar-header">
            <h3>YOUR BAG</h3>
            <span class="close-btn" onclick="toggleCart()">✕</span>
        </div>
        <div id="cart-items-container"></div>
        <div class="sidebar-footer">
            <div class="sidebar-total">
                <span>TOTAL:</span>
                <span id="sidebar-total-price">₦0</span>
            </div>
            <button class="checkout-trigger-btn" onclick="openCheckout()">PROCEED TO CHECKOUT</button>
        </div>
    </div>

    <header class="shop-nav">
        <a href="index.html"><img src="Logo.png" alt="New Wave" class="nav-logo"></a>
        <div class="cart-trigger" onclick="toggleCart()">
            <svg class="cart-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="cart-count">0</span>
        </div>
    </header>

    <main class="shop-content">
        <h2 class="drop-title">COLLECTION 01 / DROP 01</h2>
        <div class="product-grid">
            
            <!-- Product 1 -->
            <div class="product-card" onclick="toggleControls(this)">
                <div class="img-box"><img src="p1.jpg" alt="Classic Wave Tee"></div>
                <div class="product-info">
                    <h3>Classic Wave Tee</h3>
                    <p class="price">₦25,000</p>
                    <div class="product-controls">
                        <div class="selection-container">
                            <div class="selection-group">
                                <span class="label">SIZE</span>
                                <div class="options">
                                    <button class="opt-btn size-btn" data-size="L">L</button>
                                    <button class="opt-btn size-btn" data-size="XL">XL</button>
                                </div>
                            </div>
                            <div class="selection-group">
                                <span class="label">COLOR</span>
                                <div class="options">
                                    <button class="opt-btn color-btn white" data-color="White"></button>
                                    <button class="opt-btn color-btn black" data-color="Black"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="product-card" onclick="toggleControls(this)">
                <div class="img-box"><img src="p2.jpg" alt="Wave Hoodie"></div>
                <div class="product-info">
                    <h3>Wave Signature Hoodie</h3>
                    <p class="price">₦45,000</p>
                    <div class="product-controls">
                        <div class="selection-container">
                            <div class="selection-group">
                                <span class="label">SIZE</span>
                                <div class="options">
                                    <button class="opt-btn size-btn" data-size="M">M</button>
                                    <button class="opt-btn size-btn" data-size="L">L</button>
                                    <button class="opt-btn size-btn" data-size="XL">XL</button>
                                </div>
                            </div>
                            <div class="selection-group">
                                <span class="label">COLOR</span>
                                <div class="options">
                                    <button class="opt-btn color-btn black" data-color="Black"></button>
                                    <button class="opt-btn color-btn grey" data-color="Grey"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="product-card" onclick="toggleControls(this)">
                <div class="img-box"><img src="p3.jpg" alt="Liquid Pump Tee"></div>
                <div class="product-info">
                    <h3>Liquid Pump Tee</h3>
                    <p class="price">₦28,000</p>
                    <div class="product-controls">
                        <div class="selection-container">
                            <div class="selection-group">
                                <span class="label">SIZE</span>
                                <div class="options">
                                    <button class="opt-btn size-btn" data-size="L">L</button>
                                    <button class="opt-btn size-btn" data-size="XL">XL</button>
                                </div>
                            </div>
                            <div class="selection-group">
                                <span class="label">COLOR</span>
                                <div class="options">
                                    <button class="opt-btn color-btn white" data-color="White"></button>
                                    <button class="opt-btn color-btn black" data-color="Black"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product 4 -->
            <div class="product-card" onclick="toggleControls(this)">
                <div class="img-box"><img src="p4.jpg" alt="Vortex Shorts"></div>
                <div class="product-info">
                    <h3>Vortex Cargo Shorts</h3>
                    <p class="price">₦32,000</p>
                    <div class="product-controls">
                        <div class="selection-container">
                            <div class="selection-group">
                                <span class="label">SIZE</span>
                                <div class="options">
                                    <button class="opt-btn size-btn" data-size="S">S</button>
                                    <button class="opt-btn size-btn" data-size="M">M</button>
                                    <button class="opt-btn size-btn" data-size="L">L</button>
                                </div>
                            </div>
                            <div class="selection-group">
                                <span class="label">COLOR</span>
                                <div class="options">
                                    <button class="opt-btn color-btn black" data-color="Black"></button>
                                    <button class="opt-btn color-btn olive" data-color="Olive"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div> 
    </main>


    <!-- Sticky Checkout Bar -->
    <div class="sticky-checkout" id="checkout-bar">
        <div id="customer-info" style="display: none;">
            <h4 class="form-title">DELIVERY DETAILS</h4>
            <input type="text" id="customer-name" placeholder="Full Name">
            <input type="email" id="email-address" placeholder="Email Address">
            <input type="tel" id="phone-number" placeholder="Phone Number">
            <textarea id="delivery-address" placeholder="Complete Delivery Address"></textarea>
        </div>
        <div class="checkout-footer">
            <div class="total-info">
                <span class="total-label">ORDER TOTAL:</span>
                <span class="total-price" id="grand-total">₦0</span>
            </div>
            <div class="checkout-actions">
                <button class="close-checkout-btn" onclick="closeCheckout()">BACK</button>
                <button class="checkout-btn" id="main-checkout-btn">CHECKOUT</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
