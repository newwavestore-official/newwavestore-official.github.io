<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="New Wave: The official streetwear store for premium urban streetwears. Shop our latest collections and order now.Not just a brand,it is a lifestyle. ">
    <meta name="title" content="NEW WAVE">

    <meta property="og:title" content="NEW WAVE">
    <meta property="og:description" content ="NEW WAVE| Official Website store">
    <meta property="og:image" content="https://newwavestore-official.github.io/Logo.png"> 
    <meta property="og:url" content="https://newwavestore-official.github.io/">
    
    <title>NEW WAVE</title>
    
    <link rel="icon" type="image/png" href="Logo.png">
    <link rel="apple-touch-icon" href="Logo.png">
    <link rel="shortcut icon" href="Logo.png">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NEW WAVE",
    "alternateName": "NEW WAVE STREETWEAR",
      "url": "https://newwavestore-official.github.io/"
    }
    </script>
    
    <meta name="google-site-verification" content="JFUdL-rjSfUhv9A75NtqotYTRJ_6RjOKwl_aRWuIhmM" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="splash-body">
<div class ="background-blur"></div>
<div class="splash-container">
    <p class="welcome-msg">WELCOME TO THE OFFICIAL <br> NEW WAVE ONLINE SHOP.</p>
    
    <img src="Logo.png" alt="New Wave Logo" class="main-logo">

    <div class="shop-trigger-area">
        <p class="drop-description">NEW WAVE STORE | OFFICIAL WEBSITE</p>
        <a href="#" class="enter-btn">ENTER SHOP</a>
    </div>

    <footer class="splash-footer">
        <a href="mailto:newwavestore.official@gmail.com" class="splash-text">newwavestore.official@gmail.com</a>
    </footer>
</div>
<script>
document.querySelector('.enter-btn').addEventListener('click', function(e) {
    e.preventDefault();

    const container = document.querySelector('.splash-container');
    const logo = document.querySelector('.main-logo');

    // Fade out everything except the logo
    document.querySelector('.welcome-msg').style.transition = 'opacity 0.4s ease';
    document.querySelector('.welcome-msg').style.opacity = '0';
    document.querySelector('.shop-trigger-area').style.transition = 'opacity 0.4s ease';
    document.querySelector('.shop-trigger-area').style.opacity = '0';
    document.querySelector('.splash-footer').style.transition = 'opacity 0.4s ease';
    document.querySelector('.splash-footer').style.opacity = '0';

    // After fade out, animate the logo
    setTimeout(() => {
        logo.style.transition = 'transform 0.8s ease, filter 0.8s ease';
        logo.style.transform = 'scale(1.3)';
        logo.style.filter = 'drop-shadow(0 0 30px rgba(255,255,255,0.6))';
    }, 400);

    // Then redirect
    setTimeout(() => {
        window.location.href = 'Shop.html';
    }, 1400);
});
</script>


</body>
</html>
